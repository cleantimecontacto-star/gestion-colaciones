kind = "web"
previewPath = "/"
title = "Gestión Colaciones"
version = "1.0.0"
id = "artifacts/gestion-colaciones"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25556

[services.development]
run = "pnpm --filter @workspace/gestion-colaciones run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gestion-colaciones", "run", "build" ]
publicDir = "artifacts/gestion-colaciones/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25556"
BASE_PATH = "/"
